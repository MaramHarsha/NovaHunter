[supervisord]
nodaemon=true
user=root
logfile=/tmp/supervisord.log

[program:shellinabox]
command=/usr/bin/shellinaboxd -t -s /:LOGIN -p %(ENV_SHELLINABOX_PORT)s
autostart=true
autorestart=true
stdout_logfile=/tmp/shellinabox.log
stderr_logfile=/tmp/shellinabox.err.log

[program:vnc]
command=/bin/bash -lc "su - pentester -c 'vncserver :1 -geometry 1280x800 -depth 24 -localhost no' || true; tail -f /dev/null"
autostart=true
autorestart=true
stdout_logfile=/tmp/vnc.log
stderr_logfile=/tmp/vnc.err.log

[program:novnc]
command=/usr/bin/websockify --web=/usr/share/novnc/ %(ENV_NOVNC_PORT)s localhost:%(ENV_VNC_PORT)s
autostart=true
autorestart=true
stdout_logfile=/tmp/novnc.log
stderr_logfile=/tmp/novnc.err.log

