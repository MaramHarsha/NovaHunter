name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

# Keep only the most recent run per ref; older queued runs get cancelled so
# we don't pay for superseded workflows.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  python-lint:
    name: Python lint + type-check
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dev extras
        run: |
          python -m pip install --upgrade pip
          # `strix-agent` ships its lint/type tooling under the `dev` extra;
          # we install the project itself in editable mode so ruff/mypy see
          # our local sources.
          pip install -e ".[dev]"

      - name: Ruff (lint)
        run: ruff check strix

      - name: Ruff (format check)
        run: ruff format --check strix

      - name: Mypy (type check)
        run: mypy strix/api strix/core strix/tools/browser/session_registry.py

  python-tests:
    name: Python unit tests
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs: python-lint
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install project
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Pytest
        env:
          # Disable sandbox-dependent paths in the unit test run; integration
          # tests live in a separate workflow that provides Docker.
          STRIX_SANDBOX_MODE: "true"
        run: |
          pytest -q tests || pytest -q

  frontend-lint:
    name: Frontend lint + type-check
    runs-on: ubuntu-latest
    timeout-minutes: 20
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install deps
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Type-check
        run: npm run type-check

      - name: Build
        env:
          # Skip server-side bundling of auth secrets during CI.
          NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY: pk_test_ci
          CLERK_SECRET_KEY: sk_test_ci
          STRIX_API_BASE: http://localhost:8000
        run: npm run build

  compose-syntax:
    name: docker compose config
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - name: Validate compose file
        working-directory: deploy
        run: |
          cp .env.example .env
          docker compose config >/dev/null

  smoke-setup:
    name: setup.sh --dry-run
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - name: Dry-run installer
        env:
          STRIX_SETUP_DRY_RUN: "1"
        run: |
          bash scripts/setup.sh --dry-run || {
            echo "setup.sh dry-run failed"
            exit 1
          }
