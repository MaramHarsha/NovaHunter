# Pushes to ghcr.io/<owner>/novahunter-sandbox. If push fails with 403 on blob
# HEAD: (1) Repo → Settings → Actions → General → Workflow permissions must
# allow write (not "read-only"). (2) On ghcr.io package page → Package settings
# → "Manage Actions access" → grant this repository write (package may exist
# but be disconnected from the repo).
name: Build Sandbox Image

on:
  push:
    branches: [main, master]
    paths:
      - "containers/**"
      - ".github/workflows/sandbox-image.yml"
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      - name: GHCR namespace (Docker requires lowercase owner)
        id: ghcr
        run: |
          echo "owner=$(echo '${{ github.repository_owner }}' | tr '[:upper:]' '[:lower:]')" >> "$GITHUB_OUTPUT"

      # Use repository owner (lowercase), not github.actor. Actor can be a bot
      # or collaborator; GHCR tokens are scoped to the package namespace = owner.
      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ steps.ghcr.outputs.owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: containers/Dockerfile
          push: true
          # Avoid default provenance/SBOM attestation pushes that can 403 when
          # GHCR attestation permissions or package linkage are misconfigured.
          provenance: false
          sbom: false
          tags: |
            ghcr.io/${{ steps.ghcr.outputs.owner }}/novahunter-sandbox:${{ github.sha }}
            ghcr.io/${{ steps.ghcr.outputs.owner }}/novahunter-sandbox:latest
