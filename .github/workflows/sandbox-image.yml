# Build and push: ghcr.io/<lowercase-owner>/novahunter-sandbox
#
# Image tags: :<sha>, :latest, and :vX.Y.Z when triggered by a matching git tag.
#
# --- Why you can still see 403 on "HEAD .../blobs/..." even with Actions set to
#     "Read and write permissions" on the repository -----------------------------
# That toggle only widens what GITHUB_TOKEN *may* request. Publishing to GHCR
# also requires the *container package* to allow this repository to write.
# If the package was created earlier (or by hand), GitHub may not attach your
# repo → you get 403 on layer/blob HEAD during push.
#
# Fix (pick one):
#   A) Link package to repo (preferred, keeps using GITHUB_TOKEN):
#      1. Open https://github.com/users/<owner>/packages?repo_name=<repo>
#         (replace <owner>/<repo>; for orgs use the org Packages tab.)
#      2. Click package "novahunter-sandbox" → "Package settings".
#      3. "Manage Actions access" → "Add repository" → select this repo → Role
#         "Write" (or Admin). Save.
#      4. Re-run the failed workflow.
#   B) Or delete the empty/broken "novahunter-sandbox" package in that UI and
#      re-run: first successful push often auto-links the package to the repo.
#   C) Or add repo secret GHCR_PUSH_TOKEN (classic PAT: write:packages + at
#      least read:packages; for private repos add repo scope). The login step
#      below uses GHCR_PUSH_TOKEN when set, otherwise GITHUB_TOKEN.
#
# GHCR login uses lowercase repository owner (not github.actor). Provenance /
# SBOM are disabled to avoid extra attestation pushes that sometimes 403.
name: Build Sandbox Image

on:
  push:
    branches: [main, master]
    tags: ["v*.*.*"]
    paths:
      - "containers/**"
      - ".github/workflows/sandbox-image.yml"
  workflow_dispatch:

# Default token permissions for all jobs (jobs may narrow further).
permissions:
  contents: read
  packages: write

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      - name: GHCR namespace (Docker requires lowercase owner)
        id: ghcr
        run: |
          echo "owner=$(echo '${{ github.repository_owner }}' | tr '[:upper:]' '[:lower:]')" >> "$GITHUB_OUTPUT"

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ steps.ghcr.outputs.owner }}
          # Optional secret: classic PAT with write:packages (see header). If
          # unset, empty coalesces to GITHUB_TOKEN per GitHub Actions expressions.
          password: ${{ secrets.GHCR_PUSH_TOKEN || secrets.GITHUB_TOKEN }}

      - name: Image tags (SHA, latest, and semver on git tag)
        id: meta
        run: |
          OWNER="${{ steps.ghcr.outputs.owner }}"
          REG="ghcr.io/${OWNER}/novahunter-sandbox"
          SHA="${{ github.sha }}"
          LINES="${REG}:${SHA}"$'\n'"${REG}:latest"
          if [ "${{ github.ref_type }}" = "tag" ]; then
            REF_NAME="${{ github.ref_name }}"
            LINES="${LINES}"$'\n'"${REG}:${REF_NAME}"
            echo "Also tagging image as ${REF_NAME} (git tag push)."
          fi
          {
            echo "tags<<EOF"
            echo "$LINES"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: containers/Dockerfile
          push: true
          provenance: false
          sbom: false
          tags: ${{ steps.meta.outputs.tags }}
