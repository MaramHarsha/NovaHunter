name: Release

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:
    inputs:
      ref:
        description: "Git ref to release (tag or SHA)"
        required: true
        default: "main"

# Releases are a serial pipeline: one build, one publish, one container.
# We never want two release runs racing against each other for the same
# tag, hence the strict non-cancelling concurrency below.
concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build-python-package:
    name: Build Python distribution
    runs-on: ubuntu-latest
    timeout-minutes: 15
    outputs:
      version: ${{ steps.meta.outputs.version }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.ref || github.ref }}
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install build tools
        run: |
          python -m pip install --upgrade pip build

      - name: Read version
        id: meta
        run: |
          VERSION=$(python -c "import tomllib,pathlib; \
            print(tomllib.loads(pathlib.Path('pyproject.toml').read_text())['project']['version'])")
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Building strix-agent $VERSION"

      - name: Build wheel + sdist
        run: python -m build

      - uses: actions/upload-artifact@v4
        with:
          name: python-dist
          path: dist/*
          retention-days: 14

  build-container:
    name: Build API/worker container
    runs-on: ubuntu-latest
    timeout-minutes: 30
    needs: build-python-package
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.ref || github.ref }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: GHCR image path (Docker requires lowercase)
        id: ghcr
        run: |
          echo "repository=$(echo '${{ github.repository }}' | tr '[:upper:]' '[:lower:]')" >> "$GITHUB_OUTPUT"

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build & push API image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: strix/api/Dockerfile
          push: true
          tags: |
            ghcr.io/${{ steps.ghcr.outputs.repository }}/strix-api:${{ needs.build-python-package.outputs.version }}
            ghcr.io/${{ steps.ghcr.outputs.repository }}/strix-api:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  publish-release:
    name: Publish GitHub release
    runs-on: ubuntu-latest
    needs: [build-python-package, build-container]
    timeout-minutes: 10
    permissions:
      contents: write
    if: startsWith(github.ref, 'refs/tags/')
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/download-artifact@v4
        with:
          name: python-dist
          path: dist

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*
          draft: false
          prerelease: ${{ contains(github.ref, '-rc') || contains(github.ref, '-beta') }}
          generate_release_notes: true
