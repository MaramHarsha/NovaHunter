name: Build Sandbox Image

on:
  push:
    branches: [main, master]
    paths:
      - "containers/**"
      - ".github/workflows/sandbox-image.yml"
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      - name: GHCR image path (Docker requires lowercase)
        id: ghcr
        run: |
          echo "owner=$(echo '${{ github.repository_owner }}' | tr '[:upper:]' '[:lower:]')" >> "$GITHUB_OUTPUT"

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: containers/Dockerfile
          push: true
          tags: |
            ghcr.io/${{ steps.ghcr.outputs.owner }}/novahunter-sandbox:${{ github.sha }}
            ghcr.io/${{ steps.ghcr.outputs.owner }}/novahunter-sandbox:latest
