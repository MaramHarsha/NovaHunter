name: Mirror upstream Strix sandbox to GHCR

on:
  push:
    branches: [main, master]
  workflow_dispatch:
    inputs:
      source_image:
        description: "Upstream sandbox image to pull and re-tag"
        required: false
        default: "ghcr.io/usestrix/strix-sandbox:0.1.13"

# Avoid piling up identical mirror jobs on rapid pushes.
concurrency:
  group: mirror-strix-sandbox-${{ github.ref }}
  cancel-in-progress: true

jobs:
  mirror:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    permissions:
      contents: read
      packages: write
    steps:
      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Pull upstream image, retag, push to owner namespace
        env:
          INPUT_SRC: ${{ github.event.inputs.source_image }}
        run: |
          set -euo pipefail
          DEFAULT_SRC="ghcr.io/usestrix/strix-sandbox:0.1.13"
          SRC="${INPUT_SRC:-$DEFAULT_SRC}"
          if [ -z "$SRC" ]; then
            SRC="$DEFAULT_SRC"
          fi
          echo "Pulling $SRC"
          docker pull "$SRC"
          OWNER_LC=$(echo '${{ github.repository_owner }}' | tr '[:upper:]' '[:lower:]')
          DEST="ghcr.io/${OWNER_LC}/strix-sandbox-mirror"
          docker tag "$SRC" "${DEST}:${GITHUB_SHA}"
          docker tag "$SRC" "${DEST}:latest"

          # If SRC includes an explicit tag (e.g. :0.1.13), mirror that tag too.
          # This keeps workflow_dispatch overrides consistent with the published tags.
          if echo "$SRC" | grep -q ':'; then
            SRC_TAG="${SRC##*:}"
            if [ -n "$SRC_TAG" ]; then
              docker tag "$SRC" "${DEST}:${SRC_TAG}"
            fi
          fi

          # Always include the default tag for convenience.
          docker tag "$SRC" "${DEST}:0.1.13"
          docker push "${DEST}:${GITHUB_SHA}"
          docker push "${DEST}:latest"
          docker push "${DEST}:0.1.13"

          if [ -n "${SRC_TAG:-}" ]; then
            docker push "${DEST}:${SRC_TAG}"
            echo "Pushed ${DEST} (tags: ${GITHUB_SHA}, latest, 0.1.13, ${SRC_TAG})"
          else
            echo "Pushed ${DEST} (tags: ${GITHUB_SHA}, latest, 0.1.13)"
          fi
